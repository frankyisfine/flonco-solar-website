<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d7d8e"/>
      <stop offset="50%" style="stop-color:#4da3b5"/>
      <stop offset="100%" style="stop-color:#e89700"/>
    </linearGradient>
  </defs>

  <!-- Elegant wave above the text -->
  <path d="M10,38 Q120,22 240,38 Q360,22 470,38"
        fill="none" stroke="#e89700" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- FLONCO with gradient color flow -->
  <text x="10" y="72" font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
        font-size="60" font-weight="700" letter-spacing="3"
        fill="url(#g2)">FLONCO</text>

  <!-- Subtle wave baseline -->
  <path d="M10,88 Q130,97 250,88 Q370,79 470,88"
        fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <text x="14" y="108" font-family="Arial, Helvetica, sans-serif"
        font-size="11" font-weight="400" letter-spacing="11"
        fill="#94a3b8">GLOBAL</text>
</svg>
